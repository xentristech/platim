name: Desplegar a Hostinger (FTP)

# Cada push a main publica el sitio automáticamente en platim.co.
# También se puede lanzar a mano desde la pestaña "Actions" de GitHub.
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el repositorio
        uses: actions/checkout@v4

      - name: Publicar por FTP en Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Carpeta destino en Hostinger (cuenta FTP u848706566.platim.co)
          server-dir: /public_html/
          port: 21
          protocol: ftps
          security: loose
          timeout: 120000
          # Archivos que NO deben subirse al servidor
          exclude: |
            **/.git*
            **/.git*/**
            **/.github/**
            **/.agents/**
            skills-lock.json
            README.md
